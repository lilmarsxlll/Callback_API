services:

  postgres:
    image: postgres:18-alpine
    container_name: psgr
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - appnet

  migrations:
    build:
      context: .
      dockerfile: service_main/Dockerfile
    command: alembic upgrade head
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
    depends_on:
      - postgres

  service_main:
    build:
      context: .
      dockerfile: service_main/Dockerfile
    image: service_main
    environment:
      PYTHONUNBUFFERED: 1
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_HOST=${POSTGRES_HOST}
    volumes:
      - .:/python-src
    ports:
      - "8000:3000"
    depends_on:
      - postgres
    networks:
      - appnet

  service_client:
    build:
      context: .
      dockerfile: service_client/Dockerfile
    image: service_client
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - .:/python-src
    ports:
    - "8001:8001"
    depends_on:
      - service_main
    networks:
      - appnet


networks:
  appnet:
    driver: bridge

volumes:
  postgres-data:

